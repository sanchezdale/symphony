name: make-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  make-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install default workflow config
        run: |
          mkdir -p "$HOME/.config/symphony/workflows/elixir"
          cat > "$HOME/.config/symphony/workflows/elixir/WORKFLOW.md" <<'EOF'
          ---
          tracker:
            kind: linear
            api_key: $LINEAR_API_KEY
            project_slug: symphony
            active_states:
              - Todo
              - In Progress
            terminal_states:
              - Closed
              - Cancelled
              - Canceled
              - Duplicate
              - Done
          hooks:
            after_create: |
              git clone --depth 1 https://github.com/openai/symphony .
              cd elixir && mise trust
              cd elixir && mise exec -- mix deps.get
            before_remove: |
              cd elixir && mise exec -- mix workspace.before_remove
          ---

          You are an agent for this repository.
          EOF

      - name: Verify make all
        run: make all
