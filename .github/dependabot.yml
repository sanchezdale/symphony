version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps'
  - package-ecosystem: docker
    directory: '/elixir/test/support/live_e2e_docker'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps'
